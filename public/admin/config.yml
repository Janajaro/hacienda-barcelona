collections:
  - name: "bands"
    label: "Bands"
    folder: "src/content/bands"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}}"

    fields:
      - label: "Band name"
        name: "name"
        widget: "string"

      - label: "Slug"
        name: "slug"
        widget: "string"

      - label: "Annotation"
        name: "annotation"
        widget: "object"
        fields:
          - label: "Czech"
            name: "cs"
            widget: "text"

          - label: "English"
            name: "en"
            widget: "text"

      - label: "Show date"
        name: "showDate"
        widget: "string"

      - label: "Show time"
        name: "showTime"
        widget: "string"

      - label: "Stage"
        name: "stage"
        widget: "string"

      - label: "Band image"
        name: "img"
        widget: "image"

  - name: "pages"
    label: "Pages"

    files:
      - name: "more-info"
        label: "More info"
        file: "src/content/info.json"

        fields:
          - label: "Czech sections"
            name: "cs"
            widget: "list"
            fields:
              - label: "Heading"
                name: "header"
                widget: "string"

              - label: "Text"
                name: "text"
                widget: "text"

          - label: "English sections"
            name: "en"
            widget: "list"
            fields:
              - label: "Heading"
                name: "header"
                widget: "string"

              - label: "Text"
                name: "text"
                widget: "text"

      - name: "tickets"
        label: "Tickets"
        file: "src/content/tickets.json"

        fields:
          - label: "Czech version"
            name: "cs"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"

              - label: "Text before link"
                name: "textBeforeLink"
                widget: "text"

              - label: "Link text"
                name: "linkText"
                widget: "string"

              - label: "Ticket link"
                name: "ticketUrl"
                widget: "string"
                required: false

              - label: "Text after link"
                name: "textAfterLink"
                widget: "text"

          - label: "English version"
            name: "en"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"

              - label: "Text before link"
                name: "textBeforeLink"
                widget: "text"

              - label: "Link text"
                name: "linkText"
                widget: "string"

              - label: "Ticket link"
                name: "ticketUrl"
                widget: "string"
                required: false

              - label: "Text after link"
                name: "textAfterLink"
                widget: "text"

      - name: "home"
        label: "Home"
        file: "src/content/home.json"

        fields:
          - label: "Czech version"
            name: "cs"
            widget: "object"
            fields:
              - label: "Text before highlighted section"
                name: "textBeforeHighlight"
                widget: "text"

              - label: "Highlighted text"
                name: "highlightedText"
                widget: "text"

              - label: "Text after highlighted section"
                name: "textAfterHighlight"
                widget: "text"

          - label: "English version"
            name: "en"
            widget: "object"
            fields:
              - label: "Text before highlighted section"
                name: "textBeforeHighlight"
                widget: "text"

              - label: "Highlighted text"
                name: "highlightedText"
                widget: "text"

              - label: "Text after highlighted section"
                name: "textAfterHighlight"
                widget: "text"